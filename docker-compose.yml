# Vision AI Platform - Docker Compose (GPU)
# Run on Linux AI server with NVIDIA RTX 6000: docker compose up -d

services:
  vision-ai:
    build: .
    image: vision-ai-platform:latest
    container_name: vision-ai
    restart: unless-stopped
    # Use host networking so RTSP cameras reachable from the AI server host
    # are reachable from OpenCV/FFmpeg inside the container with the same routes.
    network_mode: host
    environment:
      - PORT=8080
      # URL shown in logs when opening from host
      - HOST_PORT=8080
      - HOST_NAME=localhost
      - NVIDIA_VISIBLE_DEVICES=all
      - VISION_INFERENCE_IMGSZ=${VISION_INFERENCE_IMGSZ:-480}
      - VISION_TARGET_FPS=${VISION_TARGET_FPS:-9}
      - VISION_MICRO_BATCH=${VISION_MICRO_BATCH:-8}
      - VISION_USE_FP16=${VISION_USE_FP16:-1}
      - VISION_USE_TENSORRT=${VISION_USE_TENSORRT:-1}
      - VISION_CALLBACK_POOL_WORKERS=${VISION_CALLBACK_POOL_WORKERS:-12}
      # Beta OWLv2: point to your local HF snapshot (file or directory)
      - VISION_OWLV2_LOCAL_PATH=${VISION_OWLV2_LOCAL_PATH:-/models/owlv2/}
      - VISION_FIRE_SMOKE_MODEL_PATH=${VISION_FIRE_SMOKE_MODEL_PATH:-/app/firensmoke.pt}
      - VISION_ANPR_PLATE_MODEL_PATH=${VISION_ANPR_PLATE_MODEL_PATH:-/app/ANPRlib.pt}
      - VISION_ANPR_VEHICLE_MODEL_PATH=${VISION_ANPR_VEHICLE_MODEL_PATH:-/app/LibreYOLO9s.pt}
      # Beta Florence-2 local model directory (use large model by default)
      - VISION_FLORENCE2_LOCAL_PATH=${VISION_FLORENCE2_LOCAL_PATH:-/models/florence2large/Florence-2-large}
      # Incident / beta Qwen2.5-VL local model directory
      - VISION_QWEN25VL_LOCAL_PATH=${VISION_QWEN25VL_LOCAL_PATH:-/models/qwen25vl/Qwen2.5-VL-3B-Instruct}
      # Qwen runs on GPU for faster investigation responses
      - VISION_QWEN_DEVICE=${VISION_QWEN_DEVICE:-cuda}
      # Keep Qwen loaded until explicit Exit button unload
      - VISION_QWEN_UNLOAD_AFTER_USE=${VISION_QWEN_UNLOAD_AFTER_USE:-0}
      # Keep Qwen bounded: visual tokens + image size + min free VRAM guard
      - VISION_QWEN_MIN_PIXELS=${VISION_QWEN_MIN_PIXELS:-200704}
      - VISION_QWEN_MAX_PIXELS=${VISION_QWEN_MAX_PIXELS:-1003520}
      - VISION_QWEN_IMAGE_MAX_SIDE=${VISION_QWEN_IMAGE_MAX_SIDE:-1024}
      - VISION_QWEN_GPU_MIN_FREE_GB=${VISION_QWEN_GPU_MIN_FREE_GB:-20}
      - VISION_QWEN_CHAT_MAX_NEW_TOKENS=${VISION_QWEN_CHAT_MAX_NEW_TOKENS:-220}
      # Optional 4-bit load for lower VRAM (requires bitsandbytes in image)
      - VISION_QWEN_USE_4BIT=${VISION_QWEN_USE_4BIT:-0}
      # One-VLM-at-a-time policy: loading one VLM evicts others
      - VISION_VLM_EVICT_OTHERS=${VISION_VLM_EVICT_OTHERS:-1}
      - VISION_QWEN_ALLOW_GPU_WITH_BETA=${VISION_QWEN_ALLOW_GPU_WITH_BETA:-1}
      # CUDA allocator fragmentation guard
      - PYTORCH_CUDA_ALLOC_CONF=${PYTORCH_CUDA_ALLOC_CONF:-expandable_segments:True}
      # DB, alerts snapshots, odd_uploads, incident_ai_outputs.jsonl (see bind mount below)
      - VISION_DATA_DIR=/app/data
      # Camera VLAN for Quick Add / discovery. Keep this separate from the AI server subnet.
      - VISION_CAMERA_SCAN_SUBNET=${VISION_CAMERA_SCAN_SUBNET:-172.30.121.0/24}
      # FR Detection: AntelopeV2 model directory inside container (scrfd + glintr100 + genderage .onnx files).
      # Default is /app/data/antelopev2 (inside the data bind-mount).
      # Override if models live elsewhere, e.g. - VISION_FR_ANTELOPEV2_PATH=/models/antelopev2
      - VISION_FR_ANTELOPEV2_PATH=${VISION_FR_ANTELOPEV2_PATH:-/app/data/antelopev2}
    volumes:
      # Bind-mount: vision_ai.db + alerts/ on host at .../Utthunga Dashboard/data
      - "/home/ai-team/vision_project/Utthunga Dashboard/data:/app/data"
      # Mount your local OWLv2 snapshot into the container
      - "/home/ai-team/vision_project/Utthunga Dashboard/models--google--owlv2-base-patch16-ensemble/snapshots/cfd3195ba4ea9592eec887ded089f4c08eff231d/:/models/owlv2/"
      # Mount your local Florence-2 large model directory into the container
      - "/home/ai-team/vision_project/Utthunga Dashboard/florence2_model2/:/models/florence2large/"
      # Mount your local Qwen2.5-VL model cache into the container
      - "/home/ai-team/vision_project/Utthunga Dashboard/.hf_qwen25vl_cache/:/models/qwen25vl/"
    # Recommended for PyTorch GPU (avoids SHMEM allocation limit errors)
    ipc: host
    ulimits:
      memlock: -1
      stack: 67108864
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
